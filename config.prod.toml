default_provider = "openai"
default_model = "gpt-4.1-mini"
default_temperature = 0.2

[gateway]
host = "[::]"
port = 42617
require_pairing = false
allow_public_bind = true

[memory]
backend = "none"
auto_save = false

[runtime]
reasoning_enabled = true

[autonomy]
level = "full"
auto_approve = ["file_read", "memory_recall", "web_search_tool", "web_fetch", "text_browser"]

[web_search]
enabled = true
provider = "duckduckgo"
max_results = 8
timeout_secs = 20

[web_fetch]
enabled = true
allowed_domains = ["*"]
timeout_secs = 45
max_response_size = 1000000

[text_browser]
enabled = true
preferred_browser = "w3m"
timeout_secs = 45

[transcription]
enabled = true
default_provider = "openai"
language = "es"
max_duration_secs = 180

[multimodal]
max_images = 4
max_image_size_mb = 10
allow_remote_fetch = true

[skills]
prompt_injection_mode = "compact"

[linkedin.image]
enabled = true
providers = ["dalle"]
fallback_card = false
temp_dir = "linkedin/images"
